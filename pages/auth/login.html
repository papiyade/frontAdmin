<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-night-blue via-deep-blue to-bic-blue relative overflow-hidden">
    <!-- Background Animation -->
    <div class="absolute inset-0 opacity-10">
        <div class="absolute top-10 left-10 w-72 h-72 bg-white rounded-full mix-blend-multiply filter blur-xl animate-pulse-slow"></div>
        <div class="absolute top-40 right-10 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl animate-pulse-slow animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl animate-pulse-slow animation-delay-4000"></div>
    </div>
    
    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-md px-6">
        <!-- Logo and Title -->
        <div class="text-center mb-8 animate-fade-in">
            <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-2xl">
                <i class="fas fa-users-cog text-3xl gradient-text"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Dashboard RH</h1>
            <p class="text-blue-100">Connectez-vous à votre espace</p>
        </div>
        
        <!-- Login Form -->
        <div class="glass rounded-2xl p-8 shadow-2xl animate-slide-in">
            <form id="loginForm" class="space-y-6">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-white">
                        <i class="fas fa-envelope mr-2"></i>
                        Adresse email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        required
                        class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300"
                        placeholder="votre@email.com"
                    >
                    <div id="emailError" class="text-red-300 text-sm hidden"></div>
                </div>
                
                <!-- Password Field -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-white">
                        <i class="fas fa-lock mr-2"></i>
                        Mot de passe
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all duration-300 pr-12"
                            placeholder="••••••••"
                        >
                        <button 
                            type="button" 
                            id="togglePassword"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-white/60 hover:text-white transition-colors"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="passwordError" class="text-red-300 text-sm hidden"></div>
                </div>
                
                <!-- Remember Me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 bg-white/10 border-white/20 rounded focus:ring-blue-500 focus:ring-2">
                        <span class="ml-2 text-sm text-white">Se souvenir de moi</span>
                    </label>
                    <a href="#" class="text-sm text-blue-200 hover:text-white transition-colors">
                        Mot de passe oublié ?
                    </a>
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full gradient-bg text-white font-semibold py-3 px-4 rounded-lg hover:gradient-bg-hover transition-all duration-300 btn-animate focus:outline-none focus:ring-2 focus:ring-white/50"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Se connecter
                </button>
            </form>
            
            <!-- Demo Accounts -->
            <div class="mt-8 pt-6 border-t border-white/20">
                <p class="text-center text-white/80 text-sm mb-4">Comptes de démonstration :</p>
                <div class="grid grid-cols-2 gap-3">
                    <button 
                        onclick="fillDemoAccount('superadmin')"
                        class="bg-white/10 hover:bg-white/20 text-white text-xs py-2 px-3 rounded-lg transition-all duration-300 border border-white/20"
                    >
                        <i class="fas fa-crown mr-1"></i>
                        SuperAdmin
                    </button>
                    <button 
                        onclick="fillDemoAccount('admin')"
                        class="bg-white/10 hover:bg-white/20 text-white text-xs py-2 px-3 rounded-lg transition-all duration-300 border border-white/20"
                    >
                        <i class="fas fa-building mr-1"></i>
                        Admin
                    </button>
                    <button 
                        onclick="fillDemoAccount('hr')"
                        class="bg-white/10 hover:bg-white/20 text-white text-xs py-2 px-3 rounded-lg transition-all duration-300 border border-white/20"
                    >
                        <i class="fas fa-users mr-1"></i>
                        RH
                    </button>
                    <button 
                        onclick="fillDemoAccount('employee')"
                        class="bg-white/10 hover:bg-white/20 text-white text-xs py-2 px-3 rounded-lg transition-all duration-300 border border-white/20"
                    >
                        <i class="fas fa-user mr-1"></i>
                        Employé
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-8 text-blue-100 text-sm animate-fade-in">
            <p>&copy; 2024 Dashboard RH. Tous droits réservés.</p>
        </div>
    </div>
</div>

<script>
// Initialize login form
function initLoginForm() {
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const loginBtn = document.getElementById('loginBtn');
    
    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        const icon = togglePassword.querySelector('i');
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });
    
    // Form validation
    function validateField(field, errorElement, validator, message) {
        const value = field.value.trim();
        const isValid = validator(value);
        
        if (!isValid && value !== '') {
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
            field.classList.add('border-red-400');
        } else {
            errorElement.classList.add('hidden');
            field.classList.remove('border-red-400');
        }
        
        return isValid || value === '';
    }
    
    // Real-time validation
    emailInput.addEventListener('blur', () => {
        validateField(
            emailInput,
            document.getElementById('emailError'),
            Utils.validateEmail,
            'Format email invalide'
        );
    });
    
    passwordInput.addEventListener('blur', () => {
        validateField(
            passwordInput,
            document.getElementById('passwordError'),
            (value) => value.length >= 6,
            'Le mot de passe doit contenir au moins 6 caractères'
        );
    });
    
    // Form submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        
        // Validate form
        const emailValid = validateField(
            emailInput,
            document.getElementById('emailError'),
            Utils.validateEmail,
            'Format email invalide'
        );
        
        const passwordValid = validateField(
            passwordInput,
            document.getElementById('passwordError'),
            (value) => value.length >= 6,
            'Le mot de passe doit contenir au moins 6 caractères'
        );
        
        if (!emailValid || !passwordValid || !email || !password) {
            Utils.showToast('Veuillez corriger les erreurs', 'error');
            return;
        }
        
        // Show loading state
        Utils.showLoading(loginBtn, 'Connexion...');
        
        try {
            const result = await Auth.login(email, password);
            
            Utils.showToast(result.message, 'success');
            
            // Redirect to appropriate dashboard
            setTimeout(() => {
                Router.navigate(Auth.getDashboardRoute());
            }, 1000);
            
        } catch (error) {
            Utils.showToast(error.message, 'error');
        } finally {
            Utils.hideLoading(loginBtn);
        }
    });
}

// Fill demo account credentials
function fillDemoAccount(role) {
    const credentials = {
        superadmin: { email: 'superadmin@admin.com', password: 'admin123' },
        admin: { email: 'admin@entreprise.com', password: 'admin123' },
        hr: { email: 'rh@entreprise.com', password: 'rh123' },
        employee: { email: 'employe@entreprise.com', password: 'emp123' }
    };
    
    const cred = credentials[role];
    if (cred) {
        document.getElementById('email').value = cred.email;
        document.getElementById('password').value = cred.password;
        
        // Add visual feedback
        const button = event.target;
        const originalText = button.innerHTML;
        button.innerHTML = '<i class="fas fa-check mr-1"></i>Rempli !';
        button.classList.add('bg-green-500');
        
        setTimeout(() => {
            button.innerHTML = originalText;
            button.classList.remove('bg-green-500');
        }, 1500);
    }
}
</script>
