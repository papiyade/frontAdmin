<script>
// Initialize companies page
function initCompaniesPage() {
    console.log('🔧 Initializing Companies Page...');
    
    // Load sidebar and header
    loadSidebar('superadmin');
    loadHeader();
    
    // Load companies data
    loadCompanies();
    
    // Setup event listeners
    setupCompaniesEventListeners();
    
    console.log('✅ Companies Page Initialized');
}

// Setup event listeners
function setupCompaniesEventListeners() {
    const searchInput = document.getElementById('searchCompanies');
    if (searchInput) {
        searchInput.addEventListener('input', debounce(filterCompanies, 300));
    }
    
    const statusFilter = document.getElementById('statusFilter');
    const sectorFilter = document.getElementById('sectorFilter');
    
    if (statusFilter) statusFilter.addEventListener('change', filterCompanies);
    if (sectorFilter) sectorFilter.addEventListener('change', filterCompanies);
    
    const companyForm = document.getElementById('companyForm');
    if (companyForm) {
        companyForm.addEventListener('submit', handleCompanySubmit);
    }
}

// Load companies data
async function loadCompanies() {
    try {
        showLoading('companiesTableBody');
        const companies = await MockData.getCompanies();
        displayCompanies(companies);
        updatePagination(companies.length);
    } catch (error) {
        console.error('Error loading companies:', error);
        showError('Erreur lors du chargement des entreprises');
    }
}

// Display companies in table
function displayCompanies(companies) {
    const tbody = document.getElementById('companiesTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = companies.map(company => `
        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                    <div class="flex-shrink-0 h-10 w-10">
                        <div class="h-10 w-10 rounded-full bg-gradient-to-r from-blue-500 to-blue-600 flex items-center justify-center">
                            <i class="fas fa-building text-white"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <div class="text-sm font-medium text-gray-900 dark:text-white">${company.name}</div>
                        <div class="text-sm text-gray-500 dark:text-gray-400">ID: ${company.id}</div>
                    </div>
                </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-gray-900 dark:text-white">${company.email}</div>
                <div class="text-sm text-gray-500 dark:text-gray-400">${company.phone || 'N/A'}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="text-sm text-gray-900 dark:text-white">${company.sector}</span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 dark:text-white">
                ${company.employees_count}
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getCompanyStatusBadgeClass(company.status)}">
                    ${getCompanyStatusLabel(company.status)}
                </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                <div class="flex space-x-2">
                    <button onclick="viewCompany(${company.id})" class="text-bic-blue hover:text-blue-700" title="Voir">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button onclick="editCompany(${company.id})" class="text-green-600 hover:text-green-700" title="Modifier">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="toggleCompanyStatus(${company.id})" class="text-yellow-600 hover:text-yellow-700" title="Changer statut">
                        <i class="fas fa-toggle-on"></i>
                    </button>
                    <button onclick="deleteCompany(${company.id})" class="text-red-600 hover:text-red-700" title="Supprimer">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
}

// Helper functions
function getCompanyStatusBadgeClass(status) {
    const classes = {
        'active': 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200',
        'pending': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200',
        'suspended': 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200'
    };
    return classes[status] || 'bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200';
}

function getCompanyStatusLabel(status) {
    const labels = {
        'active': 'Active',
        'pending': 'En attente',
        'suspended': 'Suspendue'
    };
    return labels[status] || status;
}

// Modal functions
function openAddCompanyModal() {
    document.getElementById('companyModalTitle').textContent = 'Ajouter une entreprise';
    document.getElementById('companyForm').reset();
    document.getElementById('companyModal').classList.remove('hidden');
}

function editCompany(companyId) {
    document.getElementById('companyModalTitle').textContent = 'Modifier l\'entreprise';
    // Load company data into form
    document.getElementById('companyModal').classList.remove('hidden');
}

function closeCompanyModal() {
    document.getElementById('companyModal').classList.add('hidden');
}

function viewCompany(companyId) {
    Router.navigate(`/superadmin/company/${companyId}`);
}

function toggleCompanyStatus(companyId) {
    if (confirm('Êtes-vous sûr de vouloir changer le statut de cette entreprise ?')) {
        showSuccess('Statut de l\'entreprise modifié');
        loadCompanies();
    }
}

function deleteCompany(companyId) {
    if (confirm('Êtes-vous sûr de vouloir supprimer cette entreprise ? Cette action est irréversible.')) {
        showSuccess('Entreprise supprimée avec succès');
        loadCompanies();
    }
}

// Filter companies
function filterCompanies() {
    const searchTerm = document.getElementById('searchCompanies').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const sectorFilter = document.getElementById('sectorFilter').value;
    
    console.log('Filtering companies:', { searchTerm, statusFilter, sectorFilter });
    loadCompanies(); // Reload with filters
}

// Export companies
function exportCompanies() {
    showSuccess('Export en cours...');
}

// Refresh companies
function refreshCompanies() {
    loadCompanies();
    showSuccess('Liste actualisée');
}

// Handle company form submission
function handleCompanySubmit(e) {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const companyData = Object.fromEntries(formData);
    
    console.log('Saving company:', companyData);
    
    setTimeout(() => {
        showSuccess('Entreprise enregistrée avec succès');
        closeCompanyModal();
        loadCompanies();
    }, 1000);
}

// Pagination
function updatePagination(totalItems) {
    document.getElementById('totalItems').textContent = totalItems;
}

// Show loading state
function showLoading(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        element.innerHTML = `
            <tr>
                <td colspan="6" class="px-6 py-4 text-center">
                    <div class="flex items-center justify-center">
                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-bic-blue"></div>
                        <span class="ml-2 text-gray-500 dark:text-gray-400">Chargement...</span>
                    </div>
                </td>
            </tr>
        `;
    }
}
</script>
