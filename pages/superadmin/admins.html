<script>
// Initialize admins page
function initAdminsPage() {
    console.log('🔧 Initializing Admins Page...');
    
    // Load sidebar and header
    loadSidebar('superadmin');
    loadHeader();
    
    // Load admins data
    loadAdmins();
    
    // Setup event listeners
    setupAdminsEventListeners();
    
    console.log('✅ Admins Page Initialized');
}

// Setup event listeners
function setupAdminsEventListeners() {
    const searchInput = document.getElementById('searchAdmins');
    if (searchInput) {
        searchInput.addEventListener('input', debounce(filterAdmins, 300));
    }
    
    const statusFilter = document.getElementById('statusFilter');
    const companyFilter = document.getElementById('companyFilter');
    
    if (statusFilter) statusFilter.addEventListener('change', filterAdmins);
    if (companyFilter) companyFilter.addEventListener('change', filterAdmins);
    
    const adminForm = document.getElementById('adminForm');
    if (adminForm) {
        adminForm.addEventListener('submit', handleAdminSubmit);
    }
}

// Load admins data
async function loadAdmins() {
    try {
        showLoading('adminsTableBody');
        const users = await MockData.getUsers();
        const admins = users.filter(user => user.role === 'admin');
        displayAdmins(admins);
        updatePagination(admins.length);
    } catch (error) {
        console.error('Error loading admins:', error);
        showError('Erreur lors du chargement des administrateurs');
    }
}

// Display admins in table
function displayAdmins(admins) {
    const tbody = document.getElementById('adminsTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = admins.map(admin => `
        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                    <div class="flex-shrink-0 h-10 w-10">
                        <div class="h-10 w-10 rounded-full bg-gradient-to-r from-purple-500 to-purple-600 flex items-center justify-center">
                            <span class="text-white font-medium">${admin.name.charAt(0)}</span>
                        </div>
                    </div>
                    <div class="ml-4">
                        <div class="text-sm font-medium text-gray-900 dark:text-white">${admin.name}</div>
                        <div class="text-sm text-gray-500 dark:text-gray-400">ID: ${admin.id}</div>
                    </div>
                </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-gray-900 dark:text-white">${admin.email}</div>
                <div class="text-sm text-gray-500 dark:text-gray-400">${admin.phone || 'N/A'}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-gray-900 dark:text-white">${admin.company || 'N/A'}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                Il y a 2 heures
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">
                    Actif
                </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                <div class="flex space-x-2">
                    <button onclick="viewAdmin(${admin.id})" class="text-bic-blue hover:text-blue-700" title="Voir">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button onclick="editAdmin(${admin.id})" class="text-green-600 hover:text-green-700" title="Modifier">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="toggleAdminStatus(${admin.id})" class="text-yellow-600 hover:text-yellow-700" title="Changer statut">
                        <i class="fas fa-toggle-on"></i>
                    </button>
                    <button onclick="deleteAdmin(${admin.id})" class="text-red-600 hover:text-red-700" title="Supprimer">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
}

// Modal functions
function openAddAdminModal() {
    document.getElementById('adminModalTitle').textContent = 'Ajouter un administrateur';
    document.getElementById('adminForm').reset();
    document.getElementById('adminModal').classList.remove('hidden');
}

function editAdmin(adminId) {
    document.getElementById('adminModalTitle').textContent = 'Modifier l\'administrateur';
    // Load admin data into form
    document.getElementById('adminModal').classList.remove('hidden');
}

function closeAdminModal() {
    document.getElementById('adminModal').classList.add('hidden');
}

function viewAdmin(adminId) {
    Router.navigate(`/superadmin/admin/${adminId}`);
}

function toggleAdminStatus(adminId) {
    if (confirm('Êtes-vous sûr de vouloir changer le statut de cet administrateur ?')) {
        showSuccess('Statut de l\'administrateur modifié');
        loadAdmins();
    }
}

function deleteAdmin(adminId) {
    if (confirm('Êtes-vous sûr de vouloir supprimer cet administrateur ?')) {
        showSuccess('Administrateur supprimé avec succès');
        loadAdmins();
    }
}

// Filter admins
function filterAdmins() {
    const searchTerm = document.getElementById('searchAdmins').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const companyFilter = document.getElementById('companyFilter').value;
    
    console.log('Filtering admins:', { searchTerm, statusFilter, companyFilter });
    loadAdmins(); // Reload with filters
}

// Export admins
function exportAdmins() {
    showSuccess('Export en cours...');
}

// Refresh admins
function refreshAdmins() {
    loadAdmins();
    showSuccess('Liste actualisée');
}

// Handle admin form submission
function handleAdminSubmit(e) {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const adminData = Object.fromEntries(formData);
    
    // Validate password confirmation
    if (adminData.adminPassword !== adminData.adminPasswordConfirm) {
        showError('Les mots de passe ne correspondent pas');
        return;
    }
    
    console.log('Saving admin:', adminData);
    
    setTimeout(() => {
        showSuccess('Administrateur enregistré avec succès');
        closeAdminModal();
        loadAdmins();
    }, 1000);
}

// Pagination
function updatePagination(totalItems) {
    document.getElementById('totalItems').textContent = totalItems;
}

// Show loading state
function showLoading(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        element.innerHTML = `
            <tr>
                <td colspan="6" class="px-6 py-4 text-center">
                    <div class="flex items-center justify-center">
                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-bic-blue"></div>
                        <span class="ml-2 text-gray-500 dark:text-gray-400">Chargement...</span>
                    </div>
                </td>
            </tr>
        `;
    }
</div>
</script>
