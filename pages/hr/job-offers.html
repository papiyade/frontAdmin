<script>
// Initialize job offers page
function initJobOffersPage() {
    console.log('🔧 Initializing Job Offers Page...');
    
    // Load sidebar and header
    loadSidebar('hr');
    loadHeader();
    
    // Load job offers data
    loadJobOffers();
    
    // Setup event listeners
    setupJobOffersEventListeners();
    
    console.log('✅ Job Offers Page Initialized');
}

// Setup event listeners
function setupJobOffersEventListeners() {
    const searchInput = document.getElementById('searchOffers');
    if (searchInput) {
        searchInput.addEventListener('input', debounce(filterJobOffers, 300));
    }
    
    const statusFilter = document.getElementById('statusFilter');
    const departmentFilter = document.getElementById('departmentFilter');
    
    if (statusFilter) statusFilter.addEventListener('change', filterJobOffers);
    if (departmentFilter) departmentFilter.addEventListener('change', filterJobOffers);
    
    const jobOfferForm = document.getElementById('jobOfferForm');
    if (jobOfferForm) {
        jobOfferForm.addEventListener('submit', handleJobOfferSubmit);
    }
}

// Load job offers data
async function loadJobOffers() {
    try {
        const jobOffers = await MockData.getJobOffers();
        displayJobOffers(jobOffers);
    } catch (error) {
        console.error('Error loading job offers:', error);
        showError('Erreur lors du chargement des offres d\'emploi');
    }
}

// Display job offers
function displayJobOffers(jobOffers) {
    const grid = document.getElementById('jobOffersGrid');
    if (!grid) return;
    
    grid.innerHTML = jobOffers.map(offer => `
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 card-hover">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">${offer.title}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">${offer.department}</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="copyJobOfferLink(${offer.id})" class="text-blue-600 hover:text-blue-700" title="Copier le lien">
                        <i class="fas fa-link"></i>
                    </button>
                    <button onclick="editJobOffer(${offer.id})" class="text-green-600 hover:text-green-700" title="Modifier">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="deleteJobOffer(${offer.id})" class="text-red-600 hover:text-red-700" title="Supprimer">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
            
            <div class="space-y-3 mb-4">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600 dark:text-gray-400">Type</span>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">${offer.type}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600 dark:text-gray-400">Niveau</span>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">${offer.level}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600 dark:text-gray-400">Localisation</span>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">${offer.location}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600 dark:text-gray-400">Salaire</span>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">${formatSalaryRange(offer.salary_min, offer.salary_max)}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600 dark:text-gray-400">Candidatures</span>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">${offer.applications_count}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600 dark:text-gray-400">Date limite</span>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">${formatDate(offer.deadline)}</span>
                </div>
            </div>
            
            <div class="mb-4">
                <p class="text-sm text-gray-700 dark:text-gray-300 line-clamp-3">${offer.description}</p>
            </div>
            
            <div class="flex items-center justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getJobOfferStatusBadgeClass(offer.status)}">
                    ${getJobOfferStatusLabel(offer.status)}
                </span>
                <div class="flex space-x-2">
                    <button onclick="viewJobOfferApplications(${offer.id})" class="text-sm px-3 py-1 bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded hover:bg-blue-200 dark:hover:bg-blue-800">
                        ${offer.applications_count} candidatures
                    </button>
                    <button onclick="toggleJobOfferStatus(${offer.id})" class="text-sm px-3 py-1 ${offer.status === 'active' ? 'bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300' : 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300'} rounded hover:opacity-80">
                        ${offer.status === 'active' ? 'Mettre en pause' : 'Activer'}
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

// Helper functions
function getJobOfferStatusBadgeClass(status) {
    const classes = {
        'active': 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200',
        'paused': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200',
        'closed': 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200'
    };
    return classes[status] || 'bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200';
}

function getJobOfferStatusLabel(status) {
    const labels = {
        'active': 'Active',
        'paused': 'En pause',
        'closed': 'Fermée'
    };
    return labels[status] || status;
}

function formatSalaryRange(min, max) {
    if (!min && !max) return 'Non spécifié';
    if (!max) return `${formatCurrency(min)}+`;
    if (!min) return `Jusqu'à ${formatCurrency(max)}`;
    return `${formatCurrency(min)} - ${formatCurrency(max)}`;
}

function formatCurrency(amount) {
    return new Intl.NumberFormat('fr-FR', {
        style: 'currency',
        currency: 'XOF',
        minimumFractionDigits: 0
    }).format(amount);
}

function formatDate(dateString) {
    return new Date(dateString).toLocaleDateString('fr-FR');
}

// Modal functions
function openAddJobOfferModal() {
    document.getElementById('jobOfferModalTitle').textContent = 'Nouvelle offre d\'emploi';
    document.getElementById('jobOfferForm').reset();
    document.getElementById('jobOfferModal').classList.remove('hidden');
}

function editJobOffer(offerId) {
    document.getElementById('jobOfferModalTitle').textContent = 'Modifier l\'offre d\'emploi';
    // Load job offer data into form
    document.getElementById('jobOfferModal').classList.remove('hidden');
}

function closeJobOfferModal() {
    document.getElementById('jobOfferModal').classList.add('hidden');
}

function deleteJobOffer(offerId) {
    if (confirm('Êtes-vous sûr de vouloir supprimer cette offre d\'emploi ?')) {
        showSuccess('Offre d\'emploi supprimée avec succès');
        loadJobOffers();
    }
}

function copyJobOfferLink(offerId) {
    const link = `${window.location.origin}/jobs/${offerId}`;
    navigator.clipboard.writeText(link).then(() => {
        showSuccess('Lien copié dans le presse-papiers');
    }).catch(() => {
        showError('Erreur lors de la copie du lien');
    });
}

function toggleJobOfferStatus(offerId) {
    showSuccess('Statut de l\'offre modifié');
    loadJobOffers();
}

function viewJobOfferApplications(offerId) {
    Router.navigate(`/hr/applications?offer=${offerId}`);
}

// Filter job offers
function filterJobOffers() {
    const searchTerm = document.getElementById('searchOffers').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const departmentFilter = document.getElementById('departmentFilter').value;
    
    console.log('Filtering job offers:', { searchTerm, statusFilter, departmentFilter });
    loadJobOffers(); // Reload with filters
}

// Refresh job offers
function refreshJobOffers() {
    loadJobOffers();
    showSuccess('Liste actualisée');
}

// Handle job offer form submission
function handleJobOfferSubmit(e) {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const jobOfferData = Object.fromEntries(formData);
    
    console.log('Saving job offer:', jobOfferData);
    
    setTimeout(() => {
        showSuccess('Offre d\'emploi publiée avec succès');
        closeJobOfferModal();
        loadJobOffers();
    }, 1000);
}
</script>
