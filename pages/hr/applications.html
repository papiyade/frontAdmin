<div class="flex h-screen bg-gray-50 dark:bg-night-blue">
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>
    
    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden lg:ml-64">
        <!-- Header -->
        <div id="headerContainer"></div>
        
        <!-- Main Content Area -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
            <!-- Page Header -->
            <div class="mb-8">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">
                            <i class="fas fa-file-alt text-bic-blue mr-3"></i>
                            Suivi des Candidatures
                        </h1>
                        <p class="text-gray-600 dark:text-gray-400">Gérez toutes les candidatures reçues</p>
                    </div>
                    <div class="flex space-x-3">
                        <button onclick="Router.navigate('/hr/job-offers')" class="px-4 py-2 border border-bic-blue text-bic-blue rounded-lg hover:bg-bic-blue hover:text-white transition-colors">
                            <i class="fas fa-briefcase mr-2"></i>
                            Voir les offres
                        </button>
                        <button onclick="exportApplications()" class="gradient-bg text-white px-6 py-3 rounded-lg hover:gradient-bg-hover transition-all duration-300">
                            <i class="fas fa-download mr-2"></i>
                            Exporter
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900 rounded-lg flex items-center justify-center">
                            <i class="fas fa-file-alt text-blue-600 dark:text-blue-400 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Total Candidatures</p>
                            <p class="text-2xl font-bold text-gray-900 dark:text-white">247</p>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-yellow-100 dark:bg-yellow-900 rounded-lg flex items-center justify-center">
                            <i class="fas fa-clock text-yellow-600 dark:text-yellow-400 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400">En attente</p>
                            <p class="text-2xl font-bold text-gray-900 dark:text-white">89</p>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-green-100 dark:bg-green-900 rounded-lg flex items-center justify-center">
                            <i class="fas fa-check text-green-600 dark:text-green-400 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Acceptées</p>
                            <p class="text-2xl font-bold text-gray-900 dark:text-white">45</p>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-red-100 dark:bg-red-900 rounded-lg flex items-center justify-center">
                            <i class="fas fa-times text-red-600 dark:text-red-400 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Rejetées</p>
                            <p class="text-2xl font-bold text-gray-900 dark:text-white">113</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                    <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="searchApplications" placeholder="Rechercher une candidature..." 
                                   class="pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-bic-blue focus:border-transparent dark:bg-gray-700 dark:text-white">
                        </div>
                        
                        <select id="statusFilter" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-bic-blue focus:border-transparent dark:bg-gray-700 dark:text-white">
                            <option value="">Tous les statuts</option>
                            <option value="pending">En attente</option>
                            <option value="reviewed">Examinée</option>
                            <option value="accepted">Acceptée</option>
                            <option value="rejected">Rejetée</option>
                        </select>
                        
                        <select id="positionFilter" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-bic-blue focus:border-transparent dark:bg-gray-700 dark:text-white">
                            <option value="">Tous les postes</option>
                            <option value="developer">Développeur</option>
                            <option value="designer">Designer</option>
                            <option value="manager">Manager</option>
                        </select>
                    </div>
                    
                    <div class="flex space-x-2">
                        <button onclick="refreshApplications()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">
                            <i class="fas fa-refresh mr-2"></i>
                            Actualiser
                        </button>
                    </div>
                </div>
            </div>

            <!-- Applications List -->
            <div class="space-y-4" id="applicationsList">
                <!-- Applications will be loaded here -->
            </div>
        </main>
    </div>
</div>

<!-- Application Details Modal -->
<div id="applicationModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
    <div class="relative top-10 mx-auto p-5 border w-11/12 md:w-4/5 lg:w-3/4 shadow-lg rounded-md bg-white dark:bg-gray-800">
        <div class="mt-3">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-bold text-gray-900 dark:text-white" id="applicationModalTitle">Détails de la candidature</h3>
                <button onclick="closeApplicationModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div id="applicationDetails">
                <!-- Application details will be loaded here -->
            </div>
            
            <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200 dark:border-gray-700">
                <button onclick="updateApplicationStatus('rejected')" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                    <i class="fas fa-times mr-2"></i>
                    Rejeter
                </button>
                <button onclick="updateApplicationStatus('reviewed')" class="px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition-colors">
                    <i class="fas fa-eye mr-2"></i>
                    Marquer comme examinée
                </button>
                <button onclick="updateApplicationStatus('accepted')" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                    <i class="fas fa-check mr-2"></i>
                    Accepter
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let currentApplicationId = null;

// Initialize applications page
function initApplicationsPage() {
    console.log('🔧 Initializing Applications Page...');
    
    // Load sidebar and header
    loadSidebar('hr');
    loadHeader();
    
    // Load applications data
    loadApplications();
    
    // Setup event listeners
    setupApplicationsEventListeners();
    
    console.log('✅ Applications Page Initialized');
}

// Setup event listeners
function setupApplicationsEventListeners() {
    const searchInput = document.getElementById('searchApplications');
    if (searchInput) {
        searchInput.addEventListener('input', debounce(filterApplications, 300));
    }
    
    const statusFilter = document.getElementById('statusFilter');
    const positionFilter = document.getElementById('positionFilter');
    
    if (statusFilter) statusFilter.addEventListener('change', filterApplications);
    if (positionFilter) positionFilter.addEventListener('change', filterApplications);
}

// Load applications data
async function loadApplications() {
    try {
        const applications = await MockData.getApplications();
        displayApplications(applications);
    } catch (error) {
        console.error('Error loading applications:', error);
        showError('Erreur lors du chargement des candidatures');
    }
}

// Display applications
function displayApplications(applications) {
    const container = document.getElementById('applicationsList');
    if (!container) return;
    
    container.innerHTML = applications.map(app => `
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 card-hover">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-medium">${app.candidate_name.charAt(0)}</span>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">${app.candidate_name}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400">${app.position}</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getApplicationStatusBadgeClass(app.status)}">
                        ${getApplicationStatusLabel(app.status)}
                    </span>
                    <button onclick="viewApplication(${app.id})" class="text-bic-blue hover:text-blue-700">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <p class="text-sm text-gray-600 dark:text-gray-400">Email</p>
                    <p class="text-sm font-medium text-gray-900 dark:text-white">${app.email}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-600 dark:text-gray-400">Téléphone</p>
                    <p class="text-sm font-medium text-gray-900 dark:text-white">${app.phone}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-600 dark:text-gray-400">Date de candidature</p>
                    <p class="text-sm font-medium text-gray-900 dark:text-white">${formatDate(app.applied_at)}</p>
                </div>
            </div>
            
            <div class="mb-4">
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-2">Expérience</p>
                <p class="text-sm text-gray-900 dark:text-white">${app.experience}</p>
            </div>
            
            <div class="flex justify-between items-center pt-4 border-t border-gray-200 dark:border-gray-700">
                <div class="flex space-x-2">
                    <button onclick="downloadCV(${app.id})" class="text-sm px-3 py-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600">
                        <i class="fas fa-download mr-1"></i>
                        CV
                    </button>
                    <button onclick="downloadCoverLetter(${app.id})" class="text-sm px-3 py-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600">
                        <i class="fas fa-file-alt mr-1"></i>
                        Lettre
                    </button>
                </div>
                <div class="flex space-x-2">
                    <button onclick="quickUpdateStatus(${app.id}, 'rejected')" class="text-red-600 hover:text-red-700" title="Rejeter">
                        <i class="fas fa-times"></i>
                    </button>
                    <button onclick="quickUpdateStatus(${app.id}, 'reviewed')" class="text-yellow-600 hover:text-yellow-700" title="Examiner">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button onclick="quickUpdateStatus(${app.id}, 'accepted')" class="text-green-600 hover:text-green-700" title="Accepter">
                        <i class="fas fa-check"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

// Helper functions
function getApplicationStatusBadgeClass(status) {
    const classes = {
        'pending': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200',
        'reviewed': 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200',
        'accepted': 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200',
        'rejected': 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200'
    };
    return classes[status] || 'bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200';
}

function getApplicationStatusLabel(status) {
    const labels = {
        'pending': 'En attente',
        'reviewed': 'Examinée',
        'accepted': 'Acceptée',
        'rejected': 'Rejetée'
    };
    return labels[status] || status;
}

function formatDate(dateString) {
    return new Date(dateString).toLocaleDateString('fr-FR');
}

// View application details
function viewApplication(applicationId) {
    currentApplicationId = applicationId;
    
    // Load application details
    loadApplicationDetails(applicationId);
    
    document.getElementById('applicationModal').classList.remove('hidden');
}

function closeApplicationModal() {
    document.getElementById('applicationModal').classList.add('hidden');
    currentApplicationId = null;
}

// Load application details
async function loadApplicationDetails(applicationId) {
    try {
        const applications = await MockData.getApplications();
        const application = applications.find(app => app.id === applicationId);
        
        if (application) {
            document.getElementById('applicationDetails').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <h4 class="text-lg font-semibold text-gray-900 dark:text-white">Informations personnelles</h4>
                        <div class="space-y-2">
                            <div>
                                <span class="text-sm text-gray-600 dark:text-gray-400">Nom complet:</span>
                                <span class="ml-2 text-sm font-medium text-gray-900 dark:text-white">${application.candidate_name}</span>
                            </div>
                            <div>
                                <span class="text-sm text-gray-600 dark:text-gray-400">Email:</span>
                                <span class="ml-2 text-sm font-medium text-gray-900 dark:text-white">${application.email}</span>
                            </div>
                            <div>
                                <span class="text-sm text-gray-600 dark:text-gray-400">Téléphone:</span>
                                <span class="ml-2 text-sm font-medium text-gray-900 dark:text-white">${application.phone}</span>
                            </div>
                            <div>
                                <span class="text-sm text-gray-600 dark:text-gray-400">Poste:</span>
                                <span class="ml-2 text-sm font-medium text-gray-900 dark:text-white">${application.position}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <h4 class="text-lg font-semibold text-gray-900 dark:text-white">Détails de la candidature</h4>
                        <div class="space-y-2">
                            <div>
                                <span class="text-sm text-gray-600 dark:text-gray-400">Date de candidature:</span>
                                <span class="ml-2 text-sm font-medium text-gray-900 dark:text-white">${formatDate(application.applied_at)}</span>
                            </div>
                            <div>
                                <span class="text-sm text-gray-600 dark:text-gray-400">Statut:</span>
                                <span class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getApplicationStatusBadgeClass(application.status)}">
                                    ${getApplicationStatusLabel(application.status)}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6">
                    <h4 class="text-lg font-semibold text-gray-900 dark:text-white mb-3">Expérience professionnelle</h4>
                    <p class="text-sm text-gray-700 dark:text-gray-300">${application.experience}</p>
                </div>
                
                <div class="mt-6">
                    <h4 class="text-lg font-semibold text-gray-900 dark:text-white mb-3">Documents</h4>
                    <div class="flex space-x-3">
                        <button onclick="downloadCV(${application.id})" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            <i class="fas fa-download mr-2"></i>
                            Télécharger CV
                        </button>
                        <button onclick="downloadCoverLetter(${application.id})" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                            <i class="fas fa-file-alt mr-2"></i>
                            Lettre de motivation
                        </button>
                    </div>
                </div>
            `;
        }
    } catch (error) {
        console.error('Error loading application details:', error);
    }
}

// Update application status
function updateApplicationStatus(status) {
    if (!currentApplicationId) return;
    
    console.log(`Updating application ${currentApplicationId} to status: ${status}`);
    
    setTimeout(() => {
        showSuccess(`Candidature ${getApplicationStatusLabel(status).toLowerCase()}`);
        closeApplicationModal();
        loadApplications();
    }, 500);
}

function quickUpdateStatus(applicationId, status) {
    if (confirm(`Êtes-vous sûr de vouloir ${getApplicationStatusLabel(status).toLowerCase()} cette candidature ?`)) {
        console.log(`Quick updating application ${applicationId} to status: ${status}`);
        
        setTimeout(() => {
            showSuccess(`Candidature ${getApplicationStatusLabel(status).toLowerCase()}`);
            loadApplications();
        }, 500);
    }
}

// Download functions
function downloadCV(applicationId) {
    showSuccess('Téléchargement du CV en cours...');
}

function downloadCoverLetter(applicationId) {
    showSuccess('Téléchargement de la lettre de motivation en cours...');
}

// Filter applications
function filterApplications() {
    const searchTerm = document.getElementById('searchApplications').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const positionFilter = document.getElementById('positionFilter').value;
    
    console.log('Filtering applications:', { searchTerm, statusFilter, positionFilter });
    loadApplications(); // Reload with filters
}

// Export applications
function exportApplications() {
    showSuccess('Export en cours...');
}

// Refresh applications
function refreshApplications() {
    loadApplications();
    showSuccess('Liste actualisée');
}
</script>
